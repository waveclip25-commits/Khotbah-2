<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with slight gradient for depth -->
  <rect width="512" height="512" rx="112" fill="url(#bg_grad)"/>
  
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#064E3B"/> <!-- Emerald Green -->
      <stop offset="1" stop-color="#0D9488"/> <!-- Teal -->
    </linearGradient>

    <!-- Glossy reflection effect -->
    <linearGradient id="gloss_grad" x1="256" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.2"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Mimbar Body Gradient -->
    <linearGradient id="mimbar_side" x1="160" y1="180" x2="240" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#059669"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>
    
    <linearGradient id="mimbar_front" x1="240" y1="180" x2="350" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="gold_grad" x1="200" y1="150" x2="320" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="0.5" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
  </defs>

  <!-- Mimbar Structure (POV Samping / 3/4 View) -->
  <!-- Side panel -->
  <path d="M160 220 L240 180 V420 L160 460 Z" fill="url(#mimbar_side)" stroke="#064E3B" stroke-width="2"/>
  
  <!-- Front panel -->
  <path d="M240 180 L380 220 V460 L240 420 Z" fill="url(#mimbar_front)" stroke="#064E3B" stroke-width="2"/>
  
  <!-- Steps/Platform side -->
  <path d="M120 460 L160 440 V480 L120 500 Z" fill="#047857"/>
  <path d="M160 440 L240 420 V460 L160 480 Z" fill="#047857"/>

  <!-- Top Curved Part (Kubah/Detail Atas) -->
  <path d="M240 180 Q310 120 380 180" stroke="url(#gold_grad)" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Book / Al-Quran on top -->
  <path d="M220 190 L280 170 L340 190 L280 210 Z" fill="url(#gold_grad)"/>
  <path d="M225 188 L280 172 L335 188 L280 205 Z" fill="white" fill-opacity="0.8"/>

  <!-- Glossy Overlay -->
  <path d="M112 0 H400 C461.859 0 512 50.1411 512 112 V256 Q256 300 0 256 V112 C0 50.1411 50.1411 0 112 0 Z" fill="url(#gloss_grad)"/>
  
  <!-- Icon Accent (Glowing Light) -->
  <circle cx="280" cy="180" r="40" fill="#F59E0B" fill-opacity="0.15">
    <animate attributeName="r" values="35;45;35" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
